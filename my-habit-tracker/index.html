<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Habit Tracker TMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0f0f12] text-zinc-100 font-sans min-h-screen pb-10">

    <div class="max-w-md mx-auto px-4 pt-4">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider" id="current-date">Суббота, 20 июня</p>
                <h1 class="text-2xl font-black bg-gradient-to-r from-white to-zinc-400 bg-clip-text text-transparent">Мои Привычки</h1>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl px-3 py-2 text-center min-w-[70px]">
                <span class="text-[10px] text-zinc-500 block uppercase font-bold">Успех</span>
                <span class="text-sm font-black text-emerald-400" id="global-success">0%</span>
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto pb-3 no-scrollbar snap-x" id="categories-container"></div>

        <div class="bg-zinc-900/60 border border-zinc-800/80 rounded-3xl p-3 mb-6">
            <p class="text-[11px] text-zinc-500 font-bold uppercase mb-2 px-1 text-center">Контроль за последние 7 дней</p>
            <div class="grid grid-cols-7 gap-1 text-center" id="calendar-strip"></div>
        </div>

        <div class="space-y-3" id="habits-list"></div>

        <button onclick="toggleModal(true)" class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-500 hover:bg-indigo-600 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-indigo-500/30 transition-transform active:scale-95 z-40">
            +
        </button>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-end sm:items-center justify-center hidden z-50 p-4">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 space-y-4 shadow-2xl">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold">Новая привычка</h3>
                <button onclick="toggleModal(false)" class="text-zinc-500 hover:text-white text-sm">Закрыть</button>
            </div>
            
            <div>
                <label class="text-xs text-zinc-400 font-bold block mb-1">Название</label>
                <input type="text" id="habit-title" placeholder="Например: Зал, Книги, Вода..." class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-indigo-500 transition-colors">
            </div>

            <div>
                <label class="text-xs text-zinc-400 font-bold block mb-2">Раздел (Категория)</label>
                <div class="grid grid-cols-3 gap-2" id="modal-categories"></div>
            </div>

            <button onclick="createNewHabit()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3.5 rounded-xl text-sm transition-all active:scale-[0.99] mt-2 shadow-lg shadow-indigo-500/20">
                Создать привычку
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const CATEGORIES = [
            { id: 'All', title: 'Все', icon: '✨' },
            { id: 'Work', title: 'Work', icon: '💼' },
            { id: 'Gym', title: 'Gym', icon: '💪' },
            { id: 'Personal', title: 'Personal', icon: '🌱' }
        ];

        let habits = [];
        let currentFilter = 'All';
        let selectedModalCategory = 'Work';
        
        // Генерация последних 7 дней динамически
        const getPast7Days = () => {
            const dates = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                dates.push(d.toISOString().split('T')[0]);
            }
            return dates;
        };
        const past7Days = getPast7Days();
        let activeSelectedDate = past7Days[6]; // По умолчанию сегодня

        const getDayName = (dateStr) => ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'][new Date(dateStr).getDay()];
        const getDayNumber = (dateStr) => new Date(dateStr).getDate();

        const loadData = () => {
            if (tg?.CloudStorage) {
                tg.CloudStorage.getItem('tma_habits_data', (err, value) => {
                    if (!err && value) { habits = JSON.parse(value); } 
                    else { loadLocalStorage(); }
                    initApp();
                });
            } else {
                loadLocalStorage();
                initApp();
            }
        };

        const loadLocalStorage = () => {
            const local = localStorage.getItem('tma_habits_data');
            habits = local ? JSON.parse(local) : [
                { id: '1', title: 'Код на Python', category: 'Work', createdAt: past7Days[0], history: [past7Days[1], past7Days[3], past7Days[5]] },
                { id: '2', title: 'Тренировка в зале', category: 'Gym', createdAt: past7Days[0], history: [past7Days[2], past7Days[4]] }
            ];
        };

        const saveData = () => {
            const jsonStr = JSON.stringify(habits);
            localStorage.setItem('tma_habits_data', jsonStr);
            if (tg?.CloudStorage) {
                tg.CloudStorage.setItem('tma_habits_data', jsonStr, (err) => { if (err) console.error(err); });
            }
        };

        const triggerHaptic = () => { if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); };

        // ЛОГИКА РАСЧЕТА ПРОЦЕНТА ПРОПУСКОВ
        const calculateMissRate = (habit) => {
            const created = new Date(habit.createdAt);
            const today = new Date(past7Days[6]);
            const totalDays = Math.max(1, Math.floor((today - created) / (1000 * 60 * 60 * 24)) + 1);
            const completedDays = habit.history.filter(d => d <= past7Days[6]).length;
            return Math.max(0, Math.round(((totalDays - completedDays) / totalDays) * 100));
        };

        const toggleHabitDate = (habitId, dateStr) => {
            triggerHaptic();
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            const idx = habit.history.indexOf(dateStr);
            if (idx > -1) habit.history.splice(idx, 1);
            else habit.history.push(dateStr);

            saveData();
            renderHabits();
            renderCalendarStrip();
            renderGlobalStats();
        };

        const setFilter = (catId) => { triggerHaptic(); currentFilter = catId; renderCategories(); renderHabits(); };

        const renderCategories = () => {
            document.getElementById('categories-container').innerHTML = CATEGORIES.map(cat => `
                <button onclick="setFilter('${cat.id}')" class="shrink-0 px-4 py-2.5 rounded-2xl text-xs font-bold border transition-all ${
                    currentFilter === cat.id ? 'bg-indigo-500 border-indigo-500 text-white shadow-lg shadow-indigo-500/20' : 'bg-zinc-900 border-zinc-800 text-zinc-400'
                }"><span class="mr-1">${cat.icon}</span> ${cat.title}</button>
            `).join('');
        };

        const renderCalendarStrip = () => {
            document.getElementById('calendar-strip').innerHTML = past7Days.map(date => {
                const isSelected = activeSelectedDate === date;
                const isToday = date === past7Days[6];
                const completedCount = habits.filter(h => h.history.includes(date)).length;
                
                let dotColor = 'bg-zinc-700';
                if (habits.length > 0 && completedCount > 0) {
                    dotColor = (completedCount / habits.length === 1) ? 'bg-emerald-400' : 'bg-indigo-400';
                }

                return `
                    <div onclick="selectStripDate('${date}')" class="flex flex-col items-center p-2 rounded-2xl cursor-pointer ${isSelected ? 'bg-zinc-800 ring-2 ring-indigo-500/50' : ''}">
                        <span class="text-[10px] ${isToday ? 'text-indigo-400 font-bold' : 'text-zinc-500'}">${getDayName(date)}</span>
                        <span class="text-sm font-bold my-1 ${isToday ? 'text-indigo-400' : 'text-zinc-200'}">${getDayNumber(date)}</span>
                        <div class="w-1.5 h-1.5 rounded-full ${dotColor}"></div>
                    </div>
                `;
            }).join('');
        };

        const selectStripDate = (date) => { triggerHaptic(); activeSelectedDate = date; renderCalendarStrip(); renderHabits(); };

        const renderGlobalStats = () => {
            if (habits.length === 0) { document.getElementById('global-success').innerText = '0%'; return; }
            const totalMiss = habits.reduce((acc, h) => acc + calculateMissRate(h), 0);
            document.getElementById('global-success').innerText = `${100 - Math.round(totalMiss / habits.length)}%`;
        };

        const renderHabits = () => {
            const filtered = habits.filter(h => currentFilter === 'All' || h.category === currentFilter);
            const container = document.getElementById('habits-list');

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-zinc-600 border border-dashed border-zinc-800 rounded-3xl text-sm">Нет привычек в этом разделе</div>`;
                return;
            }

            container.innerHTML = filtered.map(habit => {
                const missRate = calculateMissRate(habit);
                const isDone = habit.history.includes(activeSelectedDate);
                const isAvailable = activeSelectedDate >= habit.createdAt;
                const cat = CATEGORIES.find(c => c.id === habit.category);

                let mColor = 'text-emerald-400';
                if (missRate > 40) mColor = 'text-rose-400';
                else if (missRate > 15) mColor = 'text-amber-400';

                return `
                    <div class="bg-zinc-900 border border-zinc-800/80 rounded-3xl p-4">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="text-[10px] font-bold bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded-full">${cat.icon} ${cat.title}</span>
                                <h3 class="text-base font-bold mt-1 text-zinc-100">${habit.title}</h3>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] text-zinc-500 block font-bold">Пропуски</span>
                                <span class="text-xs font-black ${mColor}">${missRate}%</span>
                            </div>
                        </div>
                        <div class="flex justify-between items-center bg-zinc-950/50 border border-zinc-800/40 rounded-2xl p-2.5">
                            <span class="text-xs text-zinc-400">Статус на ${getDayNumber(activeSelectedDate)} число:</span>
                            ${!isAvailable ? `<span class="text-xs text-zinc-600 italic px-3">Ещё не создана</span>` : `
                                <button onclick="toggleHabitDate('${habit.id}', '${activeSelectedDate}')" class="px-4 py-1.5 rounded-xl text-xs font-bold transition-all active:scale-95 ${
                                    isDone ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'bg-zinc-800 text-zinc-400 border border-zinc-700/60'
                                }">${isDone ? '✓ Выполнено' : '○ Выполнить'}</button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        };

        const toggleModal = (show) => {
            triggerHaptic();
            document.getElementById('add-modal').classList.toggle('hidden', !show);
            if(show) renderModalCategories();
        };

        const renderModalCategories = () => {
            document.getElementById('modal-categories').innerHTML = CATEGORIES.filter(c => c.id !== 'All').map(cat => `
                <button onclick="selectedModalCategory='${cat.id}'; renderModalCategories();" type="button" class="px-3 py-2 rounded-xl text-xs font-bold border transition-all text-center ${
                    selectedModalCategory === cat.id ? 'bg-indigo-500 border-indigo-500 text-white' : 'bg-zinc-800 border-zinc-700 text-zinc-400'
                }"><div>${cat.icon}</div><div class="mt-0.5">${cat.title}</div></button>
            `).join('');
        };

        const createNewHabit = () => {
            const title = document.getElementById('habit-title').value.trim();
            if (!title) return;

            habits.push({ id: Date.now().toString(), title: title, category: selectedModalCategory, createdAt: past7Days[6], history: [] });
            saveData();
            toggleModal(false);
            document.getElementById('habit-title').value = '';
            initApp();
        };

        const initApp = () => {
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('ru-RU', options);
            renderCategories(); renderCalendarStrip(); renderHabits(); renderGlobalStats();
        };

        window.onload = loadData;
    </script>
</body>
</html>
