<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Habit Tracker PRO v4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0b0b0e] text-zinc-100 font-sans min-h-screen pb-24">

    <div class="max-w-md mx-auto px-4 pt-4">
        <!-- ШАПКА -->
        <div class="flex justify-between items-center mb-4">
            <div>
                <p class="text-xs text-zinc-500 font-bold uppercase tracking-wider" id="current-month-name">Загрузка...</p>
                <h1 class="text-2xl font-black bg-gradient-to-r from-white to-zinc-500 bg-clip-text text-transparent">HabitPRO</h1>
            </div>
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl px-3 py-1.5 text-center min-w-[80px]">
                <span class="text-[9px] text-zinc-500 block uppercase font-bold tracking-tight">Общий КПД</span>
                <span class="text-sm font-black text-indigo-400" id="global-success">0%</span>
            </div>
        </div>

        <!-- КАТЕГОРИИ -->
        <div class="flex gap-2 overflow-x-auto pb-3 no-scrollbar" id="categories-container"></div>

        <!-- МАСШТАБНЫЙ КАЛЕНДАРЬ-СЕТКА -->
        <div class="bg-zinc-900/50 border border-zinc-800/80 rounded-3xl p-4 mb-5">
            <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-zinc-500 uppercase mb-2">
                <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div class="text-rose-500/80">Вс</div>
            </div>
            <div class="grid grid-cols-7 gap-1.5" id="calendar-grid"><!-- Генерируется из JS --></div>
        </div>

        <!-- ЗАГОЛОВОК ЛЕНТЫ ПРИВЫЧЕК -->
        <div class="flex justify-between items-center mb-3 px-1">
            <h2 class="text-xs font-bold uppercase text-zinc-400 tracking-wider" id="selected-day-label">Привычки на сегодня</h2>
            <span class="text-[11px] text-zinc-500 font-medium" id="day-stats-summary">0 / 0 выполнено</span>
        </div>

        <!-- СПИСОК ПРИВЫЧЕК -->
        <div class="space-y-3" id="habits-list"></div>

        <!-- МАТРИЦА ПРОДУКТИВНОСТИ (GITHUB HEATMAP) -->
        <div class="mt-6 bg-zinc-900/30 border border-zinc-800/50 rounded-3xl p-4">
            <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider mb-2">Матрица продуктивности (30 дней)</h3>
            <div class="flex flex-wrap gap-1" id="github-heatmap"></div>
        </div>

        <!-- ПЛАВАЮЩАЯ КНОПКА ДОБАВЛЕНИЯ -->
        <button onclick="toggleModal(true)" class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-indigo-500/20 transition-transform active:scale-95 z-40">
            +
        </button>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО С ПОДДЕРЖКОЙ ТИПОВ ПРИВЫЧЕК -->
    <div id="add-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-end sm:items-center justify-center hidden z-50 p-3">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-md rounded-t-3xl sm:rounded-3xl p-5 space-y-4 shadow-2xl overflow-y-auto max-h-[85vh] no-scrollbar" id="modal-card">
            
            <div class="flex justify-between items-center pb-2 border-b border-zinc-800/60">
                <h3 class="text-sm font-bold text-zinc-200">Панель создания</h3>
                <button onclick="toggleModal(false)" class="text-zinc-400 text-xs bg-zinc-800 px-3 py-1 rounded-xl">Закрыть</button>
            </div>
            
            <!-- СОЗДАНИЕ ПРИВЫЧКИ -->
            <div class="space-y-3">
                <h4 class="text-[10px] font-black uppercase tracking-wider text-indigo-400">⚡️ Новая привычка</h4>
                <input type="text" id="habit-title" placeholder="Название (например: Поучить C++, Зал...)" class="w-full bg-zinc-850 border border-zinc-700/60 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 input-field">
                
                <!-- ВЫБОР ТИПА -->
                <div>
                    <label class="text-[10px] text-zinc-400 font-bold block mb-1 uppercase">Тип цели:</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="type-binary" onclick="setHabitType('binary')" class="py-2 rounded-xl text-xs font-bold border bg-indigo-500 border-indigo-500 text-white">Да / Нет</button>
                        <button id="type-numeric" onclick="setHabitType('numeric')" class="py-2 rounded-xl text-xs font-bold border bg-zinc-800 border-zinc-700 text-zinc-400">Числовой счетчик</button>
                    </div>
                </div>

                <!-- ДОП НАСТРОЙКИ ДЛЯ ЧИСЛОВОГО ТИПА -->
                <div id="numeric-options" class="hidden grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] text-zinc-500 font-bold block mb-1">План (Число)</label>
                        <input type="number" id="habit-target" value="60" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-1.5 text-sm text-center input-field">
                    </div>
                    <div>
                        <label class="text-[9px] text-zinc-500 font-bold block mb-1">Ед. изм.</label>
                        <input type="text" id="habit-units" value="мин" placeholder="мл, км, стр" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-1.5 text-sm text-center input-field">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] text-zinc-400 font-bold block mb-1 uppercase">Раздел:</label>
                    <div class="grid grid-cols-3 gap-1.5" id="modal-categories"></div>
                </div>

                <button onclick="createNewHabit()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider shadow-md">
                    Создать привычку
                </button>
            </div>

            <!-- СОЗДАНИЕ РАЗДЕЛА -->
            <div class="border-t border-zinc-800/80 pt-4 space-y-3">
                <h4 class="text-[10px] font-black uppercase tracking-wider text-amber-400">🎨 Новый раздел</h4>
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-1">
                        <input type="text" id="category-icon" value="🚀" class="w-full text-center bg-zinc-800 border border-zinc-700 rounded-xl py-2 text-sm input-field">
                    </div>
                    <div class="col-span-2">
                        <input type="text" id="category-title" placeholder="Название раздела" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-3 py-2 text-sm input-field">
                    </div>
                </div>
                <div class="flex gap-2 justify-center" id="color-selector"></div>
                <button onclick="createNewCategory()" class="w-full bg-zinc-800 hover:bg-zinc-750 text-amber-400 border border-zinc-700 font-bold py-2 rounded-xl text-[10px] uppercase tracking-wider">
                    + Добавить раздел
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const colorPalette = {
            indigo: { border: 'border-indigo-500/30', bg: 'bg-indigo-500/10', text: 'text-indigo-400', raw: '#6366f1' },
            emerald: { border: 'border-emerald-500/30', bg: 'bg-emerald-500/10', text: 'text-emerald-400', raw: '#10b981' },
            amber: { border: 'border-amber-500/30', bg: 'bg-amber-500/10', text: 'text-amber-400', raw: '#f59e0b' },
            rose: { border: 'border-rose-500/30', bg: 'bg-rose-500/10', text: 'text-rose-400', raw: '#f43f5e' },
            purple: { border: 'border-purple-500/30', bg: 'bg-purple-500/10', text: 'text-purple-400', raw: '#a855f7' }
        };

        let state = {
            habits: [],
            categories: [{ id: 'All', title: 'Все', icon: '✨', color: 'indigo' }]
        };

        let currentFilter = 'All';
        let selectedModalCategory = '';
        let selectedColorKey = 'indigo';
        let currentNewHabitType = 'binary'; // binary или numeric

        // ГЕНЕРАЦИЯ ДАТ ДЛЯ КАЛЕНДАРЯ НА ТЕКУЩИЙ МЕСЯЦ
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth();
        
        const getDaysInMonthGrid = () => {
            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            // Сдвиг для СНГ (чтобы неделя начиналась с Понедельника, а не Воскресенья)
            const paddingDays = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            const grid = [];
            for (let i = 0; i < paddingDays; i++) grid.push(null);
            for (let d = 1; d <= totalDays; d++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                grid.push(dateStr);
            }
            return grid;
        };

        const monthGridDates = getDaysInMonthGrid();
        // Находим сегодняшнюю дату в формате YYYY-MM-DD
        const todayStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        let activeSelectedDate = todayStr;

        const loadData = () => {
            if (tg?.CloudStorage) {
                tg.CloudStorage.getItem('tma_state_v4', (err, value) => {
                    if (!err && value) { 
                        state = JSON.parse(value);
                        if(!state.categories.some(c => c.id === 'All')) {
                            state.categories.unshift({ id: 'All', title: 'Все', icon: '✨', color: 'indigo' });
                        }
                    } else { loadLocalStorage(); }
                    initApp();
                });
            } else { loadLocalStorage(); initApp(); }
        };

        const loadLocalStorage = () => {
            const local = localStorage.getItem('tma_state_v4');
            if (local) state = JSON.parse(local);
        };

        const saveData = () => {
            const jsonStr = JSON.stringify(state);
            localStorage.setItem('tma_state_v4', jsonStr);
            if (tg?.CloudStorage) tg.CloudStorage.setItem('tma_state_v4', jsonStr, () => {});
        };

        const triggerHaptic = () => { if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); };

        const setHabitType = (type) => {
            currentNewHabitType = type;
            document.getElementById('type-binary').className = type === 'binary' ? 'py-2 rounded-xl text-xs font-bold border bg-indigo-500 border-indigo-500 text-white' : 'py-2 rounded-xl text-xs font-bold border bg-zinc-800 border-zinc-700 text-zinc-400';
            document.getElementById('type-numeric').className = type === 'numeric' ? 'py-2 rounded-xl text-xs font-bold border bg-indigo-500 border-indigo-500 text-white' : 'py-2 rounded-xl text-xs font-bold border bg-zinc-800 border-zinc-700 text-zinc-400';
            document.getElementById('numeric-options').classList.toggle('hidden', type !== 'numeric');
        };

        // РАСЧЕТ ПРОГРЕССА ВЫПОЛНЕНИЯ ЗА ДЕНЬ (ДЛЯ СЕТКИ)
        const getDayCompletionStats = (dateStr) => {
            const dayHabits = state.habits.filter(h => dateStr >= h.createdAt);
            if (dayHabits.length === 0) return { total: 0, done: 0, percent: 0 };
            
            let doneCount = 0;
            dayHabits.forEach(h => {
                const record = h.history && h.history[dateStr];
                if (h.type === 'numeric') {
                    if (record && record >= h.target) doneCount++;
                } else {
                    if (record === 1) doneCount++;
                }
            });
            return { total: dayHabits.length, done: doneCount, percent: Math.round((doneCount / dayHabits.length) * 100) };
        };

        // ТУГГЛ ДЛЯ ОБЫЧНЫХ И ОБНОВЛЕНИЕ ДЛЯ КОЛИЧЕСТВЕННЫХ ПРИВЫЧЕК
        const handleBinaryToggle = (habitId, dateStr) => {
            triggerHaptic();
            const habit = state.habits.find(h => h.id === habitId);
            if (!habit) return;
            if (!habit.history) habit.history = {};

            habit.history[dateStr] = habit.history[dateStr] === 1 ? 0 : 1;
            saveAndRefresh();
        };

        const handleNumericChange = (habitId, dateStr, value) => {
            const habit = state.habits.find(h => h.id === habitId);
            if (!habit) return;
            if (!habit.history) habit.history = {};

            habit.history[dateStr] = Math.max(0, parseFloat(value) || 0);
            saveAndRefresh();
        };

        const saveAndRefresh = () => {
            saveData();
            renderHabits();
            renderCalendarGrid();
            renderGlobalStats();
            renderHeatmap();
        };

        // РЕНДЕР КАЛЕНДАРНОЙ СЕТКИ С ЦВЕТОВЫМ ОТОБРАЖЕНИЕМ ПРОГРЕССА
        const renderCalendarGrid = () => {
            const container = document.getElementById('calendar-grid');
            container.innerHTML = monthGridDates.map(dateStr => {
                if (!dateStr) return `<div class="aspect-square"></div>`; // Пустышка для выравнивания дней недели
                
                const dayNum = parseInt(dateStr.split('-')[2]);
                const isSelected = activeSelectedDate === dateStr;
                const isToday = todayStr === dateStr;
                
                const stats = getDayCompletionStats(dateStr);
                
                // Рассчитываем цвет бэкграунда на основе выполнения целей дня
                let bgStyle = 'bg-zinc-950 text-zinc-400 border border-zinc-800/40';
                if (stats.total > 0) {
                    if (stats.percent === 100) bgStyle = 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/40 font-black';
                    else if (stats.percent > 0) bgStyle = 'bg-indigo-500/20 text-indigo-300 border border-indigo-500/30';
                }

                const ringStyle = isSelected ? 'ring-2 ring-indigo-400 ring-offset-2 ring-offset-[#0b0b0e]' : '';
                const todayIndicator = isToday ? 'underline decoration-2 font-black text-white' : '';

                return `
                    <div onclick="selectGridDate('${dateStr}')" class="aspect-square flex flex-col items-center justify-center rounded-xl cursor-pointer text-xs transition-all relative ${bgStyle} ${ringStyle} ${todayIndicator}">
                        <span>${dayNum}</span>
                        ${stats.total > 0 ? `<span class="text-[7px] opacity-60 absolute bottom-0.5">${stats.done}/${stats.total}</span>` : ''}
                    </div>
                `;
            }).join('');
        };

        const selectGridDate = (dateStr) => {
            triggerHaptic();
            activeSelectedDate = dateStr;
            const options = { day: 'numeric', month: 'long' };
            document.getElementById('selected-day-label').innerText = `Привычки на ${new Date(dateStr).toLocaleDateString('ru-RU', options)}`;
            renderCalendarGrid();
            renderHabits();
        };

        // РЕНДЕР КАРТОЧЕК ПРИВЫЧЕК
        const renderHabits = () => {
            const filtered = state.habits.filter(h => currentFilter === 'All' || h.category === currentFilter);
            const container = document.getElementById('habits-list');

            const dayStats = getDayCompletionStats(activeSelectedDate);
            document.getElementById('day-stats-summary').innerText = `${dayStats.done} из ${dayStats.total} выполнено`;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-zinc-600 border border-dashed border-zinc-800 rounded-3xl text-xs">Раздел пуст. Создайте цель кнопкой "+"</div>`;
                return;
            }

            container.innerHTML = filtered.map(habit => {
                const isAvailable = activeSelectedDate >= habit.createdAt;
                const record = (habit.history && habit.history[activeSelectedDate]) || 0;
                
                const cat = state.categories.find(c => c.id === habit.category) || { title: 'Общее', icon: '📁', color: 'indigo' };
                const cMap = colorPalette[cat.color] || colorPalette.indigo;

                // Умный расчет стрика
                let streak = 0;
                let check = new Date(todayStr);
                if (!habit.history || !habit.history[todayStr]) check.setDate(check.getDate() - 1);
                
                while (true) {
                    const cStr = check.toISOString().split('T')[0];
                    const rec = habit.history ? habit.history[cStr] : 0;
                    const pass = habit.type === 'numeric' ? (rec >= habit.target) : (rec === 1);
                    if (pass) { streak++; check.setDate(check.getDate() - 1); } else break;
                }

                let interactiveArea = '';
                if (!isAvailable) {
                    interactiveArea = `<span class="text-xs text-zinc-600 italic px-3">Ещё не создана</span>`;
                } else if (habit.type === 'numeric') {
                    const pct = Math.min(100, Math.round((record / habit.target) * 100));
                    interactiveArea = `
                        <div class="w-full mt-3">
                            <div class="flex justify-between items-center text-xs mb-1">
                                <span class="text-zinc-400">Прогресс: <span class="text-white font-bold">${record}</span> / ${habit.target} ${habit.units}</span>
                                <span class="text-[10px] font-bold text-indigo-400">${pct}%</span>
                            </div>
                            <div class="w-full bg-zinc-950 rounded-full h-1.5 border border-zinc-800 overflow-hidden mb-2">
                                <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-1.5 rounded-full transition-all" style="width: ${pct}%"></div>
                            </div>
                            <div class="flex gap-2 items-center">
                                <input type="number" value="${record}" onchange="handleNumericChange('${habit.id}', '${activeSelectedDate}', this.value)" class="w-20 text-center bg-zinc-950 border border-zinc-800 rounded-lg py-1 text-xs text-white focus:outline-none focus:border-indigo-500 input-field">
                                <button onclick="handleNumericChange('${habit.id}', '${activeSelectedDate}', ${record + 1})" class="bg-zinc-800 text-white font-black px-3 py-1 rounded-lg text-xs hover:bg-zinc-700 active:scale-95 transition-all">+1</button>
                            </div>
                        </div>
                    `;
                } else {
                    const isDone = record === 1;
                    interactiveArea = `
                        <button onclick="handleBinaryToggle('${habit.id}', '${activeSelectedDate}')" class="px-4 py-1.5 rounded-xl text-xs font-bold transition-all active:scale-95 ${
                            isDone ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'bg-zinc-800 text-zinc-400 border border-zinc-700/60'
                        }">${isDone ? '✓ Выполнено' : '○ Выполнить'}</button>
                    `;
                }

                return `
                    <div class="bg-zinc-900 border border-zinc-800/80 rounded-3xl p-4">
                        <div class="flex justify-between items-start ${habit.type === 'numeric' ? 'mb-1' : 'mb-3'}">
                            <div>
                                <div class="flex items-center gap-1.5 flex-wrap">
                                    <span class="text-[9px] font-bold ${cMap.bg} ${cMap.text} border ${cMap.border} px-2 py-0.5 rounded-full">${cat.icon} ${cat.title}</span>
                                    ${streak > 0 ? `<span class="text-[9px] font-black text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded-full">🔥 ${streak} дн.</span>` : ''}
                                    <button onclick="deleteHabit('${habit.id}')" class="text-[9px] text-zinc-600 hover:text-rose-400 ml-1">Удалить</button>
                                </div>
                                <h3 class="text-sm font-bold mt-1.5 text-zinc-100">${habit.title}</h3>
                            </div>
                        </div>
                        <div class="${habit.type === 'numeric' ? '' : 'flex justify-between items-center bg-zinc-950/30 border border-zinc-800/30 rounded-2xl p-2.5'}">
                            ${habit.type === 'numeric' ? '' : `<span class="text-xs text-zinc-400">Статус дня:</span>`}
                            ${interactiveArea}
                        </div>
                    </div>
                `;
            }).join('');
        };

        // GITHUB-STYLE HEATMAP (ПОСЛЕДНИЕ 30 КАЛЕНДАРНЫХ ДНЕЙ)
        const renderHeatmap = () => {
            const container = document.getElementById('github-heatmap');
            const past30Days = [];
            for (let i = 29; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                past30Days.push(d.toISOString().split('T')[0]);
            }

            container.innerHTML = past30Days.map(dateStr => {
                const stats = getDayCompletionStats(dateStr);
                let heatColor = 'bg-zinc-900';
                if (stats.total > 0) {
                    if (stats.percent === 100) heatColor = 'bg-emerald-500';
                    else if (stats.percent >= 50) heatColor = 'bg-indigo-500';
                    else if (stats.percent > 0) heatColor = 'bg-indigo-800';
                }
                return `<div class="w-3.5 h-3.5 rounded-[3px] ${heatColor}" title="${dateStr}: ${stats.percent}%"></div>`;
            }).join('');
        };

        const renderCategories = () => {
            document.getElementById('categories-container').innerHTML = state.categories.map(cat => `
                <button onclick="setFilter('${cat.id}')" class="shrink-0 flex items-center gap-1 px-3.5 py-2 rounded-2xl text-xs font-bold border transition-all ${
                    currentFilter === cat.id ? 'bg-indigo-500 border-indigo-500 text-white shadow-md' : 'bg-zinc-900 border-zinc-800 text-zinc-400'
                }">
                    <span>${cat.icon}</span> <span>${cat.title}</span>
                </button>
            `).join('');
        };

        const setFilter = (catId) => { triggerHaptic(); currentFilter = catId; renderCategories(); renderHabits(); };

        const createNewHabit = () => {
            const title = document.getElementById('habit-title').value.trim();
            if (!title) return;

            const targetVal = parseFloat(document.getElementById('habit-target').value) || 1;
            const unitsVal = document.getElementById('habit-units').value.trim() || 'ед';

            state.habits.push({
                id: Date.now().toString(),
                title: title,
                category: selectedModalCategory,
                type: currentNewHabitType,
                target: targetVal,
                units: unitsVal,
                createdAt: todayStr,
                history: {}
            });

            saveData();
            toggleModal(false);
            document.getElementById('habit-title').value = '';
            initApp();
        };

        const createNewCategory = () => {
            const title = document.getElementById('category-title').value.trim();
            const icon = document.getElementById('category-icon').value.trim() || '🚀';
            if (!title) return;

            const newId = 'cat_' + Date.now();
            state.categories.push({ id: newId, title: title, icon: icon, color: selectedColorKey });
            saveData();
            
            document.getElementById('category-title').value = '';
            triggerHaptic();
            renderCategories();
            renderModalCategories();
        };

        const deleteHabit = (habitId) => {
            if (confirm("Удалить привычку?")) { triggerHaptic(); state.habits = state.habits.filter(h => h.id !== habitId); saveAndRefresh(); }
        };

        const renderColorSelector = () => {
            document.getElementById('color-selector').innerHTML = Object.keys(colorPalette).map(key => `
                <div onclick="selectedColorKey='${key}'; renderColorSelector();" class="w-5 h-5 rounded-full cursor-pointer border transition-transform active:scale-90" style="background-color: ${colorPalette[key].raw}; border-color: ${selectedColorKey === key ? '#ffffff' : 'transparent'}"></div>
            `).join('');
        };

        const renderModalCategories = () => {
            const userCats = state.categories.filter(c => c.id !== 'All');
            const container = document.getElementById('modal-categories');
            if(userCats.length === 0) { container.innerHTML = `<div class="col-span-3 text-[10px] text-zinc-500 italic py-1 text-center">Создайте раздел ниже</div>`; selectedModalCategory = ''; return; }
            if(!selectedModalCategory && userCats.length > 0) selectedModalCategory = userCats[0].id;

            container.innerHTML = userCats.map(cat => `
                <button onclick="selectedModalCategory='${cat.id}'; renderModalCategories();" type="button" class="px-2 py-1.5 rounded-xl text-[11px] font-bold border transition-all text-center truncate ${
                    selectedModalCategory === cat.id ? 'bg-indigo-500 border-indigo-500 text-white' : 'bg-zinc-800 border-zinc-700 text-zinc-400'
                }"><span>${cat.icon}</span> <span class="ml-0.5">${cat.title}</span></button>
            `).join('');
        };

        const renderGlobalStats = () => {
            if (state.habits.length === 0) { document.getElementById('global-success').innerText = '0%'; return; }
            let totalPossible = 0; let totalDone = 0;
            // Считаем КПД за текущий месяц по всем дням, что прошли с момента создания привычек
            monthGridDates.forEach(d => {
                if(!d) return;
                state.habits.forEach(h => {
                    if (d >= h.createdAt && d <= todayStr) {
                        totalPossible++;
                        const rec = h.history && h.history[d];
                        if (h.type === 'numeric' ? (rec >= h.target) : (rec === 1)) totalDone++;
                    }
                });
            });
            document.getElementById('global-success').innerText = totalPossible > 0 ? `${Math.round((totalDone / totalPossible) * 100)}%` : '0%';
        };

        const toggleModal = (show) => {
            triggerHaptic();
            document.getElementById('add-modal').classList.toggle('hidden', !show);
            if(show) { renderModalCategories(); renderColorSelector(); setupKeyboardFix(); }
        };

        const setupKeyboardFix = () => {
            document.querySelectorAll('.input-field').forEach(input => {
                input.addEventListener('focus', () => {
                    setTimeout(() => { input.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 250);
                });
            });
        };

        const initApp = () => {
            const options = { month: 'long', year: 'numeric' };
            document.getElementById('current-month-name').innerText = new Date().toLocaleDateString('ru-RU', options);
            selectGridDate(todayStr);
            renderCategories();
            renderGlobalStats();
            renderHeatmap();
        };

        window.onload = loadData;
    </script>
</body>
</html>
